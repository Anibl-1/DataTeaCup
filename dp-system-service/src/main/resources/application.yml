# ============================================================
# dp-system-service — 仅保留本服务差异化配置
# 共享配置见 dp-service-starter/application-common.yml
# ============================================================
server:
  port: 9001

spring:
  application:
    name: dp-system-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    include: common

# MyBatis type-aliases（各服务扫描自身涉及的 entity 包）
mybatis:
  type-aliases-package: com.dataplatform.system.entity,com.dataplatform.org.entity,com.dataplatform.data.entity,com.dataplatform.message.entity

# 应用标识
app:
  name: DataTeaCup System Service

# Sentinel 应用名
sentinel:
  app:
    name: dp-system-service
